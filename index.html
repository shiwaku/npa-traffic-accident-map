<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>警察庁 交通事故マップ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="map"></div>

    <!-- Legend -->
    <div id="county-legend" class="legend">
      <h4>凡例</h4>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent-red)"></div>
        <span>死亡事故</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent-blue)"></div>
        <span>負傷事故</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent-green)"></div>
        <span>小学校</span>
      </div>
      <div class="legend-item">
        <div class="legend-square" style="background: rgba(45,186,118,0.25); border: 1.5px solid rgb(45,186,118)"></div>
        <span>最高速度(区域)30km/h<br />(ゾーン30等含む)</span>
      </div>
    </div>

    <!-- Opacity Slider -->
    <div class="map-overlay">
      <div class="map-overlay-inner">
        <label>空中写真 不透明度 <span id="slider-opacity-value">50%</span></label>
        <input id="slider-opacity" type="range" min="0" max="100" step="1" value="50" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
